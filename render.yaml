services:
  - type: web
    name: collab-tasks-api
    runtime: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: "Real-Time Collaborative Task Management API"
      - key: APP_VERSION
        value: "1.0.0"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: collab-tasks-db
          property: connectionString
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: BASE_URL
        value: "https://collab-tasks-api.onrender.com"
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "onboarding@resend.dev"
      - key: REDIS_URL
        fromService:
          name: collab-tasks-redis
          type: redis
          property: connectionString

  - type: redis
    name: collab-tasks-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: collab-tasks-db
    plan: free